name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi \
            gir1.2-gstreamer-1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-tools

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install PySide6 mutagen numpy
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check .

      - name: Compile check
        run: python -m compileall -q .

      - name: Check runtime (CI mode)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python3 scripts/check_runtime.py || true

      - name: Verify pip install
        run: |
          pip install -e .
          python3 -c "from main import main; print('entry point OK')"

      - name: Verify icons and data included
        run: |
          python3 -c "
          import pathlib
          root = pathlib.Path('.').resolve()
          icons = list(root.rglob('icons/*.svg'))
          desktop = root / 'data' / 'astra-music-player.desktop'
          print(f'icons/: {len(icons)} SVGs')
          print(f'desktop: {desktop.exists()}')
          assert len(icons) > 0, 'No SVG icons found'
          assert desktop.exists(), 'Desktop file missing'
          "

      - name: Tests (pytest)
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONUNBUFFERED: 1
        run: pytest -q
